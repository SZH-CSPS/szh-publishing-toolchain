name: build-rootfs

# Construit le rootfs WSL (Pandoc + WeasyPrint) et le publie en Release GitHub.
# Déclenché par un tag vX (ex. v2026.06.1), ou manuellement.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version du rootfs (ex. 2026.06.1)"
        required: true

permissions:
  contents: write          # nécessaire pour créer/mettre à jour la Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Déterminer la version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "v=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Construire et exporter le rootfs
        working-directory: deploy
        env:
          ENGINE: docker        # Docker est préinstallé sur les runners ubuntu-latest
        run: bash ./build-rootfs.sh "${{ steps.ver.outputs.v }}"

      - name: Publier la Release
        working-directory: deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.ver.outputs.v }}"
          TAR="szh-publishing-rootfs-$V.tar"
          # Crée la Release (1re fois) ; si elle existe déjà (re-run), met à jour les assets.
          gh release create "v$V" "$TAR" "$TAR.sha256" \
              --repo "${{ github.repository }}" \
              --title "Toolchain v$V" \
              --notes "Rootfs WSL (Pandoc + WeasyPrint) pour SZH/CSPS. Importe par deploy.ps1 via wsl --import." \
          || gh release upload "v$V" "$TAR" "$TAR.sha256" \
              --repo "${{ github.repository }}" --clobber

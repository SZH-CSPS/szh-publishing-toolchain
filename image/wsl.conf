# Baked dans le rootfs (copié en /etc/wsl.conf). Lu au démarrage de la distro.
# `wsl --terminate <distro>` après import pour forcer une relecture propre.

[user]
# Utilisateur par défaut d'une distro IMPORTÉE (le seul moyen fiable de le fixer).
default=redac

[automount]
enabled=true
# metadata : permissions POSIX persistées en attributs NTFS (utile sur /mnt/c).
# case=off : OneDrive n'est pas sensible à la casse -> cohérent avec NTFS.
options="metadata,umask=22,fmask=11,case=off"
mountFsTab=false

[interop]
enabled=true
# Pas besoin du PATH Windows dans la distro : on réduit la surface.
appendWindowsPath=false

[boot]
systemd=false
